resources:
  model_serving_endpoints:
    pm_rul_endpoint:
      name: "pm-rul-prediction-hg"
      config:
        served_entities:
          - entity_name: "ebay_anomaly_detection_catalog.predictive_maintenance.dev_hongguen_park_rul_prediction_model"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true
      ai_gateway:
        inference_table_config:
          catalog_name: "ebay_anomaly_detection_catalog"
          schema_name: "predictive_maintenance"
          table_name_prefix: "rul_inference_log"
          enabled: true
