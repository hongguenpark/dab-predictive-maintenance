resources:
  jobs:
    pm_daily_analysis:
      name: "[${bundle.target}] PM - 일일 장비 상태 분석"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Asia/Seoul"
      email_notifications:
        on_failure:
          - hongguen.park@databricks.com
      tasks:
        - task_key: ingest_sensor_data
          notebook_task:
            notebook_path: ./src/01_ingest_sensor_data.py

        - task_key: analyze_equipment_health
          depends_on:
            - task_key: ingest_sensor_data
          notebook_task:
            notebook_path: ./src/02_analyze_equipment_health.py

        - task_key: generate_alerts
          depends_on:
            - task_key: analyze_equipment_health
          notebook_task:
            notebook_path: ./src/03_generate_alerts.py
